<!DOCTYPE html>
<html>
<head>
    <title>Ethics of AI Institute Board of Directors</title>

    <style>
        body {
            background-color: #232A44;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        a {
            color: #A9C7FF;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .header-image {
            display: block;
            margin: 20px auto;
        }

        .content {
            width: 75%;
            margin: 40px auto;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            margin-bottom: 50px;
        }

        .director-box {
            display: flex;
            background-color: #1b2138;
            padding: 25px;
            margin-bottom: 40px;
            border-left: 6px solid #d25e00;
            align-items: flex-start;
        }

        .director-image {
            width: 230px;
            margin-right: 25px;flex-shrink: 0;
        }

.director-image img {
    width: 100%;
    height: auto;
    display: block;
}

        .panelist-info h3 {
            margin-top: 0;
            margin-bottom: 8px;
        }

        .panelist-title {
            font-style: italic;
            margin-bottom: 12px;
        }

        .footer {
            text-align: center;
            margin-top: 80px;
            margin-bottom: 40px;
        }

        /* Responsive for smaller screens */
        @media (max-width: 768px) {
            .panelist-box {
                flex-direction: column;
            }

            .panelist-image {
                margin-bottom: 20px;
            }
        }

    </style>
</head>

<body>

<a href="index.html">
    <img src="images/eaii.png" width="900" class="header-image">
</a>

<div class="content">

<h1>Ethics of AI Institute Board of Directors</h1>


<!-- Director 1 -->

        <img src="images/RC headshot.png" alt="Director 1">
    </div>
    <div class="panelist-info">
        <h3>Matthew S.W. Silk</h3>
        <div class="panelist-title">Executive Directors</div>
        <p>
       Matthew Silk is the Executive Director.
        </p>
    </div>
</div>


<!-- Director 2 -->
<div class="director-box">
    <div class="director-image">
        <img src="images/PM Headshot.png" alt="Director 2">
    </div>
    <div class="panelist-info">
        <h3>Samantha St. Amand</h3>
        <div class="panelist-title">Director of Administration and Finance</div>
        <p>
        Samantha is a director. 

        </p>
    </div>
</div>


<!-- Panelist 3 -->
<div class="director-box">

</div>

</html>
